<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plagiarism Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#6a11cb,#2575fc);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
border-radius:15px;
max-width:900px;
margin:auto;
}

.sentence{
font-size:14px;
word-break:break-word;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow p-4">

<h2 class="text-center mb-4">
Plagiarism Detection Result
</h2>

<h4 class="text-center mb-3">
Similarity Score: <b>{{ score }}%</b>
</h4>

<div class="progress mb-4" style="height:25px;">

<div class="progress-bar
{% if score|int < 30 %} bg-success
{% elif score|int < 60 %} bg-warning
{% else %} bg-danger
{% endif %}"

role="progressbar"
style="width: {{ score|int }}%;">

{{ score }}%

</div>

</div>

<hr>

<h5 class="mb-3">Detected Similar Sentences</h5>

{% if matches %}

<div style="max-height:350px; overflow-y:auto;">

<ul class="list-group">

{% for sentence, s in matches %}

<li class="list-group-item d-flex justify-content-between align-items-start">

<div class="ms-2 me-auto sentence">
{{ sentence }}
</div>

<span class="badge bg-danger rounded-pill">
{{ s }}%
</span>

</li>

{% endfor %}

</ul>

</div>

{% else %}

<p class="text-success text-center">
No major sentence-level plagiarism detected.
</p>

{% endif %}

<div class="text-center mt-4">

<a href="/" class="btn btn-primary">
Check Another Document
</a>

</div>

</div>

</div>

</body>

</html>
